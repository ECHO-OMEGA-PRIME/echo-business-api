name = "echo-business-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CACHE"
id = "53e7b1ed5acf4f3d8e91938c48fb641e"

[[d1_databases]]
